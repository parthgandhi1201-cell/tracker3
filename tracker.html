<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography Tracker</title>

  <style>
    body {
      font-family: Georgia, serif;
      background: #f5f5f5;
      margin: 0;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    h1 {
      font-size: 26px;
      margin: 5px 0;
    }

    .date-label {
      font-size: 14px;
      margin-bottom: 10px;
    }

    input[type="date"] {
      padding: 8px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 15px;
    }

    td,
    th {
      border: 1px solid #ccc;
      padding: 12px;
    }

    th {
      font-size: 12px;
    }

    .row-label {
      font-size: 12px;
      font-weight: bold;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      background: black;
      color: white;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    @media print {

      button,
      input[type="date"],
      .date-label {
        display: none;
      }

      body {
        background: white;
      }
    }
  </style>
</head>

<body>

  <div class="container" id="printArea">

    <div class="date-label">Select Date</div>
    <input type="date" id="datePicker">

    <h1>Photography Tracker</h1>

    <table>
      <tr>
        <th></th>
        <th>ANUPAMA</th>
        <th>AWAIS</th>
        <th>NIRAV</th>
        <th>HIMANSHU</th>
      </tr>

      <tr>
        <td class="row-label">HEADSHOTS</td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
      </tr>

      <tr>
        <td class="row-label">INDIVIDUAL</td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
      </tr>

      <tr>
        <td class="row-label">1 ON 1</td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
      </tr>

      <tr>
        <td class="row-label">GROUP</td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
        <td><input type="checkbox"></td>
      </tr>
    </table>

  </div>

  <button onclick="exportPDF()">Export as PDF</button>

  <script>
    const checkboxes = document.querySelectorAll("input[type='checkbox']");
    const datePicker = document.getElementById("datePicker");

    // Get today's date
    const today = new Date().toISOString().split("T")[0];
    datePicker.value = today;

    // Load data for selected date
    function loadData(date) {
      checkboxes.forEach((box, i) => {
        const key = date + "_cb_" + i;
        box.checked = localStorage.getItem(key) === "true";
      });
    }

    // Save data
    checkboxes.forEach((box, i) => {
      box.addEventListener("change", () => {
        const date = datePicker.value;
        const key = date + "_cb_" + i;
        localStorage.setItem(key, box.checked);
      });
    });

    // On date change
    datePicker.addEventListener("change", () => {
      loadData(datePicker.value);
    });

    // Initial load
    loadData(today);

    // Export PDF
    function exportPDF() {
      const selectedDate = datePicker.value;
      document.title = "Photography Tracker - " + selectedDate;
      window.print();
    }
  </script>

</body>

</html>
